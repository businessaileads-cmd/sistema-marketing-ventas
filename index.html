// ============================================================
// UI COMPONENTS
// ============================================================
function KPICard({icon, label, value, subvalue, trend, color, small}) {
  const isPos = trend && trend >= 0;
  return (
    <div style={{background:C.bgCard,border:`1px solid ${C.border}`,borderRadius:12,padding:small?'14px 16px':'20px 24px',display:'flex',flexDirection:'column',gap:8}}
      onMouseEnter={e=>e.currentTarget.style.borderColor=color||C.gold}
      onMouseLeave={e=>e.currentTarget.style.borderColor=C.border}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div style={{background:`${color||C.gold}20`,borderRadius:8,padding:8,display:'flex',alignItems:'center',justifyContent:'center'}}>
          <Icon type={icon} size={small?16:20} color={color||C.gold}/>
        </div>
        {trend!==undefined&&<span style={{fontSize:12,fontWeight:600,color:isPos?C.green:C.red}}>{isPos?'▲':'▼'} {Math.abs(trend)}%</span>}
      </div>
      <div>
        <div style={{fontSize:small?11:12,color:C.gray,fontWeight:500,textTransform:'uppercase',letterSpacing:0.5}}>{label}</div>
        <div style={{fontSize:small?20:28,fontWeight:700,color:C.white,marginTop:2}}>{value}</div>
        {subvalue&&<div style={{fontSize:12,color:C.gray,marginTop:2}}>{subvalue}</div>}
      </div>
    </div>
  );
}

function StatusBadge({status}) {
  const cfg={verde:{bg:`${C.green}20`,c:C.green,l:'En meta'},amarillo:{bg:`${C.orange}20`,c:C.orange,l:'Atención'},rojo:{bg:`${C.red}20`,c:C.red,l:'Crítico'}};
  const x=cfg[status]||cfg.verde;
  return <span style={{background:x.bg,color:x.c,fontSize:11,fontWeight:600,padding:'3px 10px',borderRadius:20,textTransform:'uppercase',letterSpacing:0.5}}>{x.l}</span>;
}

function LuqueTip({title,children}) {
  return <div style={{background:`${C.gold}08`,border:`1px solid ${C.gold}25`,borderRadius:12,padding:'14px 20px',marginBottom:24,fontSize:13,color:C.grayLight,lineHeight:1.5}}><strong style={{color:C.gold}}>{title||'Metodología Luque:'}</strong> {children}</div>;
}

function NumInput({value,onChange,width}) {
  return <input type="number" value={value} onChange={e=>onChange(Number(e.target.value)||0)} style={{background:C.bgDark,border:`1px solid ${C.border}`,borderRadius:8,padding:'10px 14px',color:C.white,fontSize:16,fontWeight:600,width:width||'100%',textAlign:'right',outline:'none',boxSizing:'border-box'}}/>;
}

function TextInput({value,onChange,width,placeholder}) {
  return <input type="text" value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} style={{background:C.bgDark,border:`1px solid ${C.border}`,borderRadius:8,padding:'10px 14px',color:C.white,fontSize:14,fontWeight:500,width:width||'100%',outline:'none',boxSizing:'border-box'}}/>;
}

function RegistrationForm({onSubmit, initialData}) {
  const [form, setForm] = useState(initialData || {
    nombreCompleto: '',
    email: '',
    telefonoWhatsapp: '',
    instagramHandle: '',
    nombreEmpresa: '',
    industria: 'Otro',
    ciudad: '',
    pais: 'Colombia',
    descripcionNegocio: '',
    facturacionMensual: ''
  });

  const handleChange = (field, value) => {
    setForm(p => ({...p, [field]: value}));
  };

  const handleSubmit = () => {
    if (!form.nombreCompleto || !form.email || !form.telefonoWhatsapp || !form.nombreEmpresa || !form.ciudad || !form.pais) {
      alert('Por favor completa todos los campos requeridos (*).');
      return;
    }
    onSubmit(form);
  };

  return (
    <div style={{background:C.bgDark, minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center', padding:'20px'}}>
      <div style={{width:'100%', maxWidth:900}}>
        {/* Logo/Branding */}
        <div style={{textAlign:'center', marginBottom:40}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:16,marginBottom:20}}>
            <div style={{background:`linear-gradient(135deg,${C.gold},${C.orange})`, borderRadius:14, width:70, height:70, display:'flex', alignItems:'center', justifyContent:'center'}}>
              <Icon type="zap" size={38} color={C.bgDark}/>
            </div>
            <svg viewBox="0 0 120 90" style={{width:100,height:75}}>
              <path d="M15 68C15 68 8 68 6 58C4 48 10 30 20 24C30 18 38 22 42 28L54 62C54 62 58 72 52 76C46 80 40 68 36 58L26 34" fill="none" stroke={C.white} strokeWidth="6" strokeLinecap="round"/>
              <path d="M42 28L54 62C58 72 64 76 68 68L82 18" fill="none" stroke={C.white} strokeWidth="6" strokeLinecap="round"/>
              <circle cx="80" cy="10" r="5" fill={C.gold}/>
              <text x="60" y="90" fill={C.gray} fontSize="11" fontWeight="700" fontFamily="Inter,sans-serif" textAnchor="middle">BUSINESS GROWTH</text>
            </svg>
          </div>
          <h1 style={{fontSize:28, fontWeight:700, color:C.white, margin:0, marginBottom:8}}>Máquina del Dinero</h1>
          <h2 style={{fontSize:20, fontWeight:600, color:C.gold, margin:0, marginBottom:12}}>Accede al Sistema de Marketing y Ventas</h2>
          <p style={{fontSize:14, color:C.gray, margin:0}}>Completa tu perfil para acceder a las herramientas de la Máquina del Dinero</p>
        </div>

        {/* Form */}
        <div style={{background:C.bgCard, border:`1px solid ${C.border}`, borderRadius:12, padding:32}}>
          <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:20, marginBottom:20}}>
            <div>
              <label style={{display:'block', fontSize:12, fontWeight:600, color:C.gold, marginBottom:8}}>Nombre Completo *</label>
              <TextInput value={form.nombreCompleto} onChange={v=>handleChange('nombreCompleto',v)} placeholder="Tu nombre"/>
            </div>
            <div>
              <label style={{display:'block', fontSize:12, fontWeight:600, color:C.gold, marginBottom:8}}>Email *</label>
              <TextInput value={form.email} onChange={v=>handleChange('email',v)} placeholder="tu@email.com"/>
            </div>
          </div>

          <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:20, marginBottom:20}}>
            <div>
              <label style={{display:'block', fontSize:12, fontWeight:600, color:C.gold, marginBottom:8}}>Teléfono / WhatsApp *</label>
              <TextInput value={form.telefonoWhatsapp} onChange={v=>handleChange('telefonoWhatsapp',v)} placeholder="+57 300 1234567"/>
            </div>

          </div>

          <div style={{marginBottom:20}}>
            <label style={{display:'block', fontSize:12, fontWeight:600, color:C.gold, marginBottom:8}}>Facturación mensual actual (opcional)</label>
            <NumInput value={form.facturacionMensual} onChange={v=>handleChange('facturacionMensual',v)}/>
          </div>

          <button onClick={handleSubmit} style={{background:`linear-gradient(135deg,${C.gold},${C.orange})`, border:'none', borderRadius:8, padding:'12px 32px', fontSize:16, fontWeight:600, color:C.bgDark, cursor:'pointer', width:'100%', boxSizing:'border-box', transition:'all 0.3s'}}>
            Acceder al Sistema
          </button>
        </div>

        <p style={{textAlign:'center', fontSize:12, color:C.gray, marginTop:20}}>

        <div style={{textAlign:'center', marginTop:16, display:'flex', alignItems:'center', justifyContent:'center', gap:6}}>

          <img src="https://assets.cdn.filesafe.space/dGHJkt1tVLPcTSFvaxx5/media/67c8ac9b-7108-4995-9787-c2de356939be.png" alt="AI Business Growth" style={{width:80,height:40,filter:'invert(1)',objectFit:'contain'}} />

function ConfigTab({metrics, setMetrics, goals, setGoals, profile, setShowRegistration, setProfile}) {
  const [showEditProfile, setShowEditProfile] = useState(false);
  const [expandProfile, setExpandProfile] = useState(false);

  const handleProfileUpdate = (newProfile) => {
    setProfile(newProfile);
    localStorage.setItem('mdm_perfil', JSON.stringify(newProfile));
    setShowEditProfile(false);
  };

// TAB: DASHBOARD
// ============================================================
function DashboardTab({metrics,goals}) {
  const revData=[
    {mes:'Sep',real:8500,meta:10000},{mes:'Oct',real:12300,meta:12000},
    {mes:'Nov',real:11800,meta:14000},{mes:'Dic',real:18500,meta:16000},
    {mes:'Ene',real:16200,meta:18000},{mes:'Feb',real:metrics.facturacion,meta:goals.metaFacturacion}
  ];
  const funnelData=[
    {etapa:'Alcance',valor:metrics.alcance,color:C.blue},
    {etapa:'Leads',valor:metrics.leads,color:C.purple},
    {etapa:'Prospectos',valor:metrics.prospectos,color:C.orange},
    {etapa:'Llamadas',valor:metrics.llamadas,color:C.gold},
    {etapa:'Cierres',valor:metrics.cierres,color:C.green}
  ];
  const cpl=metrics.leads>0?(metrics.inversionMarketing/metrics.leads).toFixed(2):0;
  const cpa=metrics.cierres>0?(metrics.inversionMarketing/metrics.cierres).toFixed(2):0;
  const roas=metrics.inversionMarketing>0?(metrics.facturacion/metrics.inversionMarketing).toFixed(1):0;
  const ticket=metrics.cierres>0?(metrics.facturacion/metrics.cierres).toFixed(0):0;
  const convGen=metrics.alcance>0?((metrics.cierres/metrics.alcance)*100).toFixed(2):0;
  const pctMeta=goals.metaFacturacion>0?((metrics.facturacion/goals.metaFacturacion)*100).toFixed(0):0;
  const diag=()=>{
    if(Number(roas)<2)return'Tu ROAS está por debajo de 2x. Revisa tu oferta o segmentación. Enfócate en conversión antes de escalar.';
    if(metrics.leads>0&&metrics.prospectos/metrics.leads<0.3)return'Generas leads pero pocos califican. Ajusta tu gancho y lead magnet — atraes gente equivocada.';
    if(metrics.llamadas>0&&metrics.cierres/metrics.llamadas<0.2)return'Bajo cierre. Revisa tu script de ventas. Un closer debería cerrar mínimo 25%.';
    return'Números saludables. Escala lo que funciona y optimiza tu embudo para más volumen.';
  };
  return (
    <div>
      <div style={{background:`linear-gradient(135deg,${C.darkMid},${C.darkLight})`,border:`1px solid ${C.gold}40`,borderRadius:12,padding:'20px 28px',marginBottom:24,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div><div style={{fontSize:14,color:C.gold,fontWeight:600,marginBottom:4}}>MÁQUINA DEL DINERO — SISTEMA DE MARKETING Y VENTAS</div><div style={{fontSize:13,color:C.grayLight}}>"Los números no mienten. Tu negocio crece cuando tus métricas crecen." — A. Luque</div></div>
        <div style={{textAlign:'right'}}><div style={{fontSize:12,color:C.gray}}>Meta del mes</div><div style={{fontSize:24,fontWeight:700,color:C.gold}}>${goals.metaFacturacion.toLocaleString()}</div><div style={{fontSize:12,color:Number(pctMeta)>=80?C.green:C.orange}}>{pctMeta}% alcanzado</div></div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:14,marginBottom:28}}>
        <KPICard icon="dollar" label="Facturación" value={`$${metrics.facturacion.toLocaleString()}`} subvalue={`Meta: $${goals.metaFacturacion.toLocaleString()}`} trend={12} color={C.green}/>
        <KPICard icon="users" label="Leads" value={metrics.leads} subvalue={`CPL: $${cpl}`} trend={8} color={C.purple}/>
        <KPICard icon="target" label="Cierres" value={metrics.cierres} subvalue={`Ticket: $${Number(ticket).toLocaleString()}`} trend={5} color={C.gold}/>
        <KPICard icon="bar" label="ROAS" value={`${roas}x`} subvalue={`CPA: $${cpa}`} trend={Number(roas)>3?15:-5} color={C.blue}/>
        <KPICard icon="trending" label="Conv. General" value={`${convGen}%`} subvalue="Alcance → Cierre" color={C.accent}/>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1.5fr 1fr',gap:20,marginBottom:28}}>
        <div style={{background:C.bgCard,border:`1px solid ${C.border}`,borderRadius:12,padding:20}}>
          <h3 style={{fontSize:16,fontWeight:600,color:C.white,margin:'0 0 16px 0'}}>Facturación Mensual</h3>
          <ResponsiveContainer width="100%" height={240}>
            <AreaChart data={revData}>
              <defs><linearGradient id="gR" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor={C.gold} stopOpacity={0.3}/><stop offset="95%" stopColor={C.gold} stopOpacity={0}/></linearGradient></defs>
              <CartesianGrid strokeDasharray="3 3" stroke={C.border}/>
              <XAxis dataKey="mes" stroke={C.gray} fontSize={12}/>
              <YAxis stroke={C.gray} fontSize={12} tickFormatter={v=>`$${(v/1000).toFixed(0)}k`}/>
              <Tooltip contentStyle={{background:C.bgCard,border:`1px solid ${C.border}`,borderRadius:8,fontSize:13}} formatter={v=>[`$${v.toLocaleString()}`,'']}/>
              <Area type="monotone" dataKey="real" stroke={C.gold} fill="url(#gR)" strokeWidth={2} name="Real"/>
              <Line type="monotone" dataKey="meta" stroke={C.gray} strokeDasharray="5 5" strokeWidth={1.5} dot={false} name="Meta"/>
            </AreaChart>
          </ResponsiveContainer>
        </div>
        <div style={{background:C.bgCard,border:`1px solid ${C.border}`,borderRadius:12,padding:20}}>
          <h3 style={{fontSize:16,fontWeight:600,color:C.white,margin:'0 0 16px 0'}}>Embudo del Mes</h3>
          {funnelData.map((s,i)=>{
            const maxV=funnelData[0].valor||1;const w=Math.max((s.valor/maxV)*100,15);
            const cr=i>0&&funnelData[i-1].valor>0?((s.valor/funnelData[i-1].valor)*100).toFixed(1):null;
            return <div key={s.etapa} style={{marginBottom:8}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
                <span style={{fontSize:12,color:C.grayLight}}>{s.etapa}</span>
                <div style={{display:'flex',gap:8}}><span style={{fontSize:14,fontWeight:700,color:C.white}}>{s.valor.toLocaleString()}</span>{cr&&<span style={{fontSize:11,color:s.color,fontWeight:600}}>{cr}%</span>}</div>
              </div>
              <div style={{background:C.border,borderRadius:4,height:8,overflow:'hidden'}}><div style={{background:`linear-gradient(90deg,${s.color},${s.color}90)`,width:`${w}%`,height:'100%',borderRadius:4}}/></div>
            </div>;
          })}
        </div>
      </div>
      <div style={{background:`${C.gold}10`,border:`1px solid ${C.gold}30`,borderRadius:12,padding:'16px 24px',display:'flex',gap:12}}>
        <Icon type="zap" size={20} color={C.gold}/>
        <div><div style={{fontSize:13,fontWeight:600,color:C.gold,marginBottom:4}}>DIAGNÓSTICO AUTOMÁTICO</div><div style={{fontSize:13,color:C.grayLight,lineHeight:1.5}}>{diag()}</div></div>
      </div>
    </div>
  );
}

// TAB: EMBUDO
// ============================================================
function EmbudoTab({metrics,setMetrics}) {
  const stages=[
    {key:'alcance',label:'Alcance',desc:'Personas que ven tu contenido',color:C.blue,icon:'eye'},
    {key:'leads',label:'Leads',desc:'Personas que dejan sus datos',color:C.purple,icon:'users'},
    {key:'prospectos',label:'Prospectos Calificados',desc:'Leads que califican',color:C.orange,icon:'target'},
    {key:'llamadas',label:'Llamadas/Demos',desc:'Conversaciones de venta',color:C.gold,icon:'phone'},
    {key:'cierres',label:'Cierres',desc:'Clientes que compran',color:C.green,icon:'check'}
  ];
  const benchmarks=[null,5,35,60,25];
  const tips=()=>{
    const t=[];const lr=metrics.leads>0?(metrics.prospectos/metrics.leads)*100:0;
    const pr=metrics.prospectos>0?(metrics.llamadas/metrics.prospectos)*100:0;
    const cr=metrics.llamadas>0?(metrics.cierres/metrics.llamadas)*100:0;
    if(metrics.alcance<5000)t.push({text:'Alcance bajo. Más contenido o más inversión en tráfico.',p:'alta'});
    if(lr<30)t.push({text:'Pocos leads califican. Tu gancho atrae gente equivocada.',p:'alta'});
    if(pr<50)t.push({text:'Prospectos no agendan. Más urgencia y prueba social.',p:'media'});
    if(cr<25)t.push({text:'Bajo cierre. ¿Vendes o presentas? Revisa tu script.',p:'alta'});
    if(!t.length)t.push({text:'Métricas saludables. Optimiza y escala.',p:'baja'});
    return t;
  };
  return (
    <div>
      <div style={{marginBottom:20}}><div style={{display:'flex',alignItems:'center',gap:10,marginBottom:4}}><Icon type="layers" size={22} color={C.gold}/><h2 style={{fontSize:20,fontWeight:700,color:C.white,margin:0}}>Embudo de Marketing y Ventas</h2></div><p style={{fontSize:13,color:C.gray,marginLeft:32}}>Ingresa tus números. El sistema calcula conversiones y detecta fugas.</p></div>
      <div style={{background:C.bgCard,border:`1px solid ${C.border}`,borderRadius:12,padding:32,marginBottom:24}}>
        <div style={{display:'flex',flexDirection:'column',alignItems:'center'}}>
          {stages.map((s,i)=>{
            const w=100-((70)/(stages.length-1))*i;
            const cr=i>0&&metrics[stages[i-1].key]>0?((metrics[s.key]/metrics[stages[i-1].key])*100).toFixed(1):null;
            return <div key={s.key} style={{width:'100%',display:'flex',flexDirection:'column',alignItems:'center'}}>
              {i>0&&<div style={{display:'flex',alignItems:'center',gap:8,padding:'6px 0'}}><Icon type="arrowDown" size={16} color={C.gray}/><span style={{fontSize:13,fontWeight:700,color:Number(cr)<10?C.red:Number(cr)<25?C.orange:C.green,background:`${Number(cr)<10?C.red:Number(cr)<25?C.orange:C.green}15`,padding:'2px 12px',borderRadius:20}}>{cr}% conversión</span></div>}
              <div style={{width:`${w}%`,background:`linear-gradient(135deg,${s.color}25,${s.color}10)`,border:`1px solid ${s.color}40`,borderRadius:12,padding:'16px 24px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <div style={{display:'flex',alignItems:'center',gap:12}}>
                  <div style={{background:`${s.color}30`,borderRadius:8,padding:8}}><Icon type={s.icon} size={20} color={s.color}/></div>
                  <div><div style={{fontSize:14,fontWeight:600,color:C.white}}>{s.label}</div><div style={{fontSize:11,color:C.gray}}>{s.desc}</div></div>
                </div>
                <NumInput value={metrics[s.key]} onChange={v=>setMetrics(m=>({...m,[s.key]:v}))} width={110}/>
              </div>
            </div>;
          })}
        </div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
        <div style={{background:C.bgCard,border:`1px solid ${C.border}`,borderRadius:12,padding:20}}>
          <h3 style={{fontSize:16,fontWeight:600,color:C.white,margin:'0 0 12px 0'}}>¿Dónde está la fuga?</h3>
          {stages.slice(1).map((s,i)=>{const prev=stages[i];const rate=metrics[prev.key]>0?(metrics[s.key]/metrics[prev.key])*100:0;const b=benchmarks[i+1];const st=rate>=b?'verde':rate>=b*0.6?'amarillo':'rojo';
            return <div key={s.key} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 14px',background:C.bgDark,borderRadius:8,marginBottom:8}}>
              <div><span style={{fontSize:13,color:C.grayLight}}>{prev.label} → {s.label}</span><div style={{fontSize:11,color:C.gray}}>Benchmark: {b}%</div></div>
              <div style={{display:'flex',alignItems:'center',gap:10}}><span style={{fontSize:16,fontWeight:700,color:C.white}}>{rate.toFixed(1)}%</span><StatusBadge status={st}/></div>
            </div>;
          })}
        </div>
        <div style={{background:C.bgCard,border:`1px solid ${C.border}`,borderRadius:12,padding:20}}>
          <h3 style={{fontSize:16,fontWeight:600,color:C.white,margin:'0 0 12px 0'}}>Recomendaciones Luque</h3>
          {tips().map((t,i)=><div key={i} style={{padding:'12px 14px',background:C.bgDark,borderRadius:8,borderLeft:`3px solid ${t.p==='alta'?C.red:t.p==='media'?C.orange:C.green}`,marginBottom:8}}><div style={{fontSize:13,color:C.grayLight,lineHeight:1.5}}>{t.text}</div></div>)}
        </div>
      </div>
    </div>
  );
}

// TAB: CALCULADORA
// ============================================================
function CalcTab() {
  const [f,setF]=useState({metaFact:20000,ticket:1600,tasaCierre:25,tasaLlam:60,tasaCal:35,tasaLead:5,cpl:5});
  const u=(k,v)=>setF(p=>({...p,[k]:v}));
  const calc=useMemo(()=>{
    const cl=f.ticket>0?Math.ceil(f.metaFact/f.ticket):0;
    const ll=f.tasaCierre>0?Math.ceil(cl/(f.tasaCierre/100)):0;
    const pr=f.tasaLlam>0?Math.ceil(ll/(f.tasaLlam/100)):0;
    const le=f.tasaCal>0?Math.ceil(pr/(f.tasaCal/100)):0;
    const al=f.tasaLead>0?Math.ceil(le/(f.tasaLead/100)):0;
    const inv=le*f.cpl;
    return {cl,ll,pr,le,al,inv};
  },[f]);
  const roas=calc.inv>0?(f.metaFact/calc.inv).toFixed(1):0;
  const results=[
    {l:'Clientes necesarios',v:calc.cl,icon:'check',c:C.green},
    {l:'Llamadas necesarias',v:calc.ll,icon:'phone',c:C.gold},
    {l:'Prospectos calificados',v:calc.pr,icon:'target',c:C.orange},
    {l:'Leads necesarios',v:calc.le,icon:'users',c:C.purple},
    {l:'Alcance necesario',v:calc.al.toLocaleString(),icon:'eye',c:C.blue}
  ];
  return (
    <div>
      <div style={{marginBottom:20}}><div style={{display:'flex',alignItems:'center',gap:10,marginBottom:4}}><Icon type="calc" size={22} color={C.gold}/><h2 style={{fontSize:20,fontWeight:700,color:C.white,margin:0}}>Calculadora de Ingeniería Inversa</h2></div><p style={{fontSize:13,color:C.gray,marginLeft:32}}>Tu meta → las acciones exactas que necesitas.</p></div>
      <LuqueTip>No empieces por "cuánto contenido hago". Empieza por cuánto quieres facturar y trabaja hacia atrás.</LuqueTip>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:24}}>
        <div style={{background:C.bgCard,border:`1px solid ${C.border}`,borderRadius:12,padding:24}}>
          <h3 style={{fontSize:16,fontWeight:600,color:C.white,margin:'0 0 20px 0'}}>Tus Variables</h3>
          {[{k:'metaFact',l:'Meta facturación mensual ($)'},{k:'ticket',l:'Ticket promedio ($)'},{k:'tasaCierre',l:'Tasa de cierre (%)'},{k:'tasaLlam',l:'% Prospectos que agendan'},{k:'tasaCal',l:'% Leads que califican'},{k:'tasaLead',l:'% Alcance → Lead'},{k:'cpl',l:'CPL estimado ($)'}].map(x=>(
            <div key={x.k} style={{marginBottom:14}}><label style={{fontSize:12,color:C.gray,fontWeight:500,display:'block',marginBottom:6}}>{x.l}</label><NumInput value={f[x.k]} onChange={v=>u(x.k,v)}/></div>
          ))}
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:16}}>
          <div style={{background:`linear-gradient(135deg,${C.darkMid},${C.darkLight})`,border:`1px solid ${C.gold}40`,borderRadius:12,padding:24}}>
            <h3 style={{fontSize:16,fontWeight:600,color:C.gold,margin:'0 0 20px 0'}}>Tu Receta para ${f.metaFact.toLocaleString()}/mes</h3>
            {results.map(r=>(
              <div key={r.l} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 16px',background:`${r.c}10`,borderRadius:8,borderLeft:`3px solid ${r.c}`,marginBottom:10}}>
                <div style={{display:'flex',alignItems:'center',gap:10}}><Icon type={r.icon} size={18} color={r.c}/><span style={{fontSize:14,color:C.grayLight}}>{r.l}</span></div>

function App() {
  const [tab,setTab]=useState('config');
  const [metrics,setMetrics]=useState({facturacion:16200,alcance:55000,leads:420,prospectos:145,llamadas:65,cierres:18,inversionMarketing:1770,contenidoPublicado:28});
  const [goals,setGoals]=useState({metaFacturacion:20000,metaLeads:500,metaCierres:25});
  const [profile, setProfile] = useState(null);
  const [showRegistration, setShowRegistration] = useState(false);
  const [planGuerra, setPlanGuerra] = useState({
    identidadCreador: '',
    clienteIdeal: '',
    avatarProfile: '',
    cuadrante1: '',
    cuadrante2: '',
    cuadrante3: '',
    cuadrante4: ''
  });

  // Load from localStorage on mount
  useEffect(() => {
    const savedProfile = localStorage.getItem('mdm_perfil');
    if (savedProfile) {
      setProfile(JSON.parse(savedProfile));
    } else {
      setShowRegistration(true);
    }

    const savedMetrics = localStorage.getItem('mdm_datos');
    if (savedMetrics) {
      const saved = JSON.parse(savedMetrics);
      if (saved.metrics) setMetrics(saved.metrics);
      if (saved.goals) setGoals(saved.goals);
    }

    const savedPlanGuerra = localStorage.getItem('mdm_plan_guerra');
    if (savedPlanGuerra) {
      setPlanGuerra(JSON.parse(savedPlanGuerra));
    }
  }, []);

  // Auto-save metrics and goals
  useEffect(() => {
    if (profile) {
      localStorage.setItem('mdm_datos', JSON.stringify({metrics, goals}));
    }
  }, [metrics, goals, profile]);

  const handleProfileSubmit = async (formData) => {
    // Send webhook if configured
    if (GHL_WEBHOOK_URL) {
      try {
        const payload = {
          ...formData,
          timestamp: new Date().toISOString()
        };
        await fetch(GHL_WEBHOOK_URL, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify(payload)
        });
      } catch (e) {
        console.log('Webhook call failed (optional):', e);
      }
    }

    // Save profile locally
    setProfile(formData);
    localStorage.setItem('mdm_perfil', JSON.stringify(formData));
    setShowRegistration(false);
  };

  if (showRegistration || !profile) {
    return <RegistrationForm onSubmit={handleProfileSubmit} initialData={profile}/>;
  }

  const firstName = profile.nombreCompleto.split(' ')[0];
  const tabs=[
    {k:'config',l:'Mi Negocio',i:'settings'},
    {k:'planGuerra',l:'Plan de Guerra',i:'megaphone'},
    {k:'dashboard',l:'Dashboard',i:'bar'},
    {k:'embudo',l:'Embudo',i:'layers'},
    {k:'calculadora',l:'Calculadora',i:'calc'},
    {k:'scorecard',l:'Scorecard',i:'target'},
    {k:'calendario',l:'Agendar',i:'calendar'}
  ];

  return (
    <div style={{background:C.bgDark,minHeight:'100vh',fontFamily:"'Inter',-apple-system,sans-serif",color:C.white}}>
      <div style={{background:C.bgCard,borderBottom:`1px solid ${C.border}`,padding:'14px 32px',display:'flex',justifyContent:'space-between',alignItems:'center',position:'sticky',top:0,zIndex:100}}>
        <div style={{display:'flex',alignItems:'center',gap:14}}>
          <svg viewBox="0 0 60 50" style={{width:40,height:34}}>
            <path d="M8 38C8 38 4 38 3 32C2 26 6 16 11 12C16 8 21 11 23 15L31 33C31 33 33 39 29 41C25 43 21 35 19 29L13 17" fill="none" stroke={C.gold} strokeWidth="4" strokeLinecap="round"/>
            <path d="M23 15L31 33C33 39 37 41 39 37L47 9" fill="none" stroke={C.gold} strokeWidth="4" strokeLinecap="round"/>

        </div>
      </div>
    </div>
  );
}

function DashboardTab({metrics,goals}) {
  const revData=[
    {mes:'Sep',real:8500,meta:10000},{mes:'Oct',real:12300,meta:12000},
    {mes:'Nov',real:11800,meta:14000},{mes:'Dic',real:18500,meta:16000},
    {mes:'Ene',real:16200,meta:18000},{mes:'Feb',real:metrics.facturacion,meta:goals.metaFacturacion}
  ];
  const funnelData=[
    {etapa:'Alcance',valor:metrics.alcance,color:C.blue},
    {etapa:'Leads',valor:metrics.leads,color:C.purple},
    {etapa:'Prospectos',valor:metrics.prospectos,color:C.orange},
    {etapa:'Llamadas',valor:metrics.llamadas,color:C.gold},
    {etapa:'Cierres',valor:metrics.cierres,color:C.green}
  ];
  const cpl=metrics.leads>0?(metrics.inversionMarketing/metrics.leads).toFixed(2):0;
  const cpa=metrics.cierres>0?(metrics.inversionMarketing/metrics.cierres).toFixed(2):0;
  const roas=metrics.inversionMarketing>0?(metrics.facturacion/metrics.inversionMarketing).toFixed(1):0;
  const ticket=metrics.cierres>0?(metrics.facturacion/metrics.cierres).toFixed(0):0;
  const convGen=metrics.alcance>0?((metrics.cierres/metrics.alcance)*100).toFixed(2):0;
  const pctMeta=goals.metaFacturacion>0?((metrics.facturacion/goals.metaFacturacion)*100).toFixed(0):0;
  const diag=()=>{
    if(Number(roas)<2)return'Tu ROAS está por debajo de 2x. Revisa tu oferta o segmentación. Enfócate en conversión antes de escalar.';
    if(metrics.leads>0&&metrics.prospectos/metrics.leads<0.3)return'Generas leads pero pocos califican. Ajusta tu gancho y lead magnet — atraes gente equivocada.';
    if(metrics.llamadas>0&&metrics.cierres/metrics.llamadas<0.2)return'Bajo cierre. Revisa tu script de ventas. Un closer debería cerrar mínimo 25%.';
    return'Números saludables. Escala lo que funciona y optimiza tu embudo para más volumen.';
  };
  return (
    <div>
      <div style={{background:`linear-gradient(135deg,${C.darkMid},${C.darkLight})`,border:`1px solid ${C.gold}40`,borderRadius:12,padding:'20px 28px',marginBottom:24,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div><div style={{fontSize:14,color:C.gold,fontWeight:600,marginBottom:4}}>MÁQUINA DEL DINERO — SISTEMA DE MARKETING Y VENTAS</div><div style={{fontSize:13,color:C.grayLight}}>"Los números no mienten. Tu negocio crece cuando tus métricas crecen." — A. Luque</div></div>
        <div style={{textAlign:'right'}}><div style={{fontSize:12,color:C.gray}}>Meta del mes</div><div style={{fontSize:24,fontWeight:700,color:C.gold}}>${goals.metaFacturacion.toLocaleString()}</div><div style={{fontSize:12,color:Number(pctMeta)>=80?C.green:C.orange}}>{pctMeta}% alcanzado</div></div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:14,marginBottom:28}}>
        <KPICard icon="dollar" label="Facturación" value={`$${metrics.facturacion.toLocaleString()}`} subvalue={`Meta: $${goals.metaFacturacion.toLocaleString()}`} trend={12} color={C.green}/>
        <KPICard icon="users" label="Leads" value={metrics.leads} subvalue={`CPL: $${cpl}`} trend={8} color={C.purple}/>
        <KPICard icon="target" label="Cierres" value={metrics.cierres} subvalue={`Ticket: $${Number(ticket).toLocaleString()}`} trend={5} color={C.gold}/>
        <KPICard icon="bar" label="ROAS" value={`${roas}x`} subvalue={`CPA: $${cpa}`} trend={Number(roas)>3?15:-5} color={C.blue}/>
        <KPICard icon="trending" label="Conv. General" value={`${convGen}%`} subvalue="Alcance → Cierre" color={C.accent}/>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1.5fr 1fr',gap:20,marginBottom:28}}>
        <div style={{background:C.bgCard,border:`1px solid ${C.border}`,borderRadius:12,padding:20}}>
          <h3 style={{fontSize:16,fontWeight:600,color:C.white,margin:'0 0 16px 0'}}>Facturación Mensual</h3>
          <ResponsiveContainer width="100%" height={240}>
            <AreaChart data={revData}>
              <defs><linearGradient id="gR" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor={C.gold} stopOpacity={0.3}/><stop offset="95%" stopColor={C.gold} stopOpacity={0}/></linearGradient></defs>
              <CartesianGrid strokeDasharray="3 3" stroke={C.border}/>
              <XAxis dataKey="mes" stroke={C.gray} fontSize={12}/>
              <YAxis stroke={C.gray} fontSize={12} tickFormatter={v=>`$${(v/1000).toFixed(0)}k`}/>
              <Tooltip contentStyle={{background:C.bgCard,border:`1px solid ${C.border}`,borderRadius:8,fontSize:13}} formatter={v=>[`$${v.toLocaleString()}`,'']}/>
              <Area type="monotone" dataKey="real" stroke={C.gold} fill="url(#gR)" strokeWidth={2} name="Real"/>
              <Line type="monotone" dataKey="meta" stroke={C.gray} strokeDasharray="5 5" strokeWidth={1.5} dot={false} name="Meta"/>
            </AreaChart>
          </ResponsiveContainer>
        </div>
        <div style={{background:C.bgCard,border:`1px solid ${C.border}`,borderRadius:12,padding:20}}>
          <h3 style={{fontSize:16,fontWeight:600,color:C.white,margin:'0 0 16px 0'}}>Embudo del Mes</h3>
          {funnelData.map((s,i)=>{
            const maxV=funnelData[0].valor||1;const w=Math.max((s.valor/maxV)*100,15);
            const cr=i>0&&funnelData[i-1].valor>0?((s.valor/funnelData[i-1].valor)*100).toFixed(1):null;
            return <div key={s.etapa} style={{marginBottom:8}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
                <span style={{fontSize:12,color:C.grayLight}}>{s.etapa}</span>
                <div style={{display:'flex',gap:8}}><span style={{fontSize:14,fontWeight:700,color:C.white}}>{s.valor.toLocaleString()}</span>{cr&&<span style={{fontSize:11,color:s.color,fontWeight:600}}>{cr}%</span>}</div>
              </div>
              <div style={{background:C.border,borderRadius:4,height:8,overflow:'hidden'}}><div style={{background:`linear-gradient(90deg,${s.color},${s.color}90)`,width:`${w}%`,height:'100%',borderRadius:4}}/></div>
            </div>;
          })}
        </div>
      </div>
      <div style={{background:`${C.gold}10`,border:`1px solid ${C.gold}30`,borderRadius:12,padding:'16px 24px',display:'flex',gap:12}}>
        <Icon type="zap" size={20} color={C.gold}/>
        <div><div style={{fontSize:13,fontWeight:600,color:C.gold,marginBottom:4}}>DIAGNÓSTICO AUTOMÁTICO</div><div style={{fontSize:13,color:C.grayLight,lineHeight:1.5}}>{diag()}</div></div>
      </div>
    </div>
  );
}

// TAB: EMBUDO
// ============================================================
function EmbudoTab({metrics,setMetrics}) {
  const stages=[
    {key:'alcance',label:'Alcance',desc:'Personas que ven tu contenido',color:C.blue,icon:'eye'},
    {key:'leads',label:'Leads',desc:'Personas que dejan sus datos',color:C.purple,icon:'users'},
    {key:'prospectos',label:'Prospectos Calificados',desc:'Leads que califican',color:C.orange,icon:'target'},
    {key:'llamadas',label:'Llamadas/Demos',desc:'Conversaciones de venta',color:C.gold,icon:'phone'},
    {key:'cierres',label:'Cierres',desc:'Clientes que compran',color:C.green,icon:'check'}
  ];
  const benchmarks=[null,5,35,60,25];
  const tips=()=>{
    const t=[];const lr=metrics.leads>0?(metrics.prospectos/metrics.leads)*100:0;
    const pr=metrics.prospectos>0?(metrics.llamadas/metrics.prospectos)*100:0;
    const cr=metrics.llamadas>0?(metrics.cierres/metrics.llamadas)*100:0;
    if(metrics.alcance<5000)t.push({text:'Alcance bajo. Más contenido o más inversión en tráfico.',p:'alta'});
    if(lr<30)t.push({text:'Pocos leads califican. Tu gancho atrae gente equivocada.',p:'alta'});
    if(pr<50)t.push({text:'Prospectos no agendan. Más urgencia y prueba social.',p:'media'});
    if(cr<25)t.push({text:'Bajo cierre. ¿Vendes o presentas? Revisa tu script.',p:'alta'});
    if(!t.length)t.push({text:'Métricas saludables. Optimiza y escala.',p:'baja'});
    return t;
  };
  return (
    <div>
      <div style={{marginBottom:20}}><div style={{display:'flex',alignItems:'center',gap:10,marginBottom:4}}><Icon type="layers" size={22} color={C.gold}/><h2 style={{fontSize:20,fontWeight:700,color:C.white,margin:0}}>Embudo de Marketing y Ventas</h2></div><p style={{fontSize:13,color:C.gray,marginLeft:32}}>Ingresa tus números. El sistema calcula conversiones y detecta fugas.</p></div>
      <div style={{background:C.bgCard,border:`1px solid ${C.border}`,borderRadius:12,padding:32,marginBottom:24}}>
        <div style={{display:'flex',flexDirection:'column',alignItems:'center'}}>
          {stages.map((s,i)=>{
            const w=100-((70)/(stages.length-1))*i;
            const cr=i>0&&metrics[stages[i-1].key]>0?((metrics[s.key]/metrics[stages[i-1].key])*100).toFixed(1):null;
            return <div key={s.key} style={{width:'100%',display:'flex',flexDirection:'column',alignItems:'center'}}>
              {i>0&&<div style={{display:'flex',alignItems:'center',gap:8,padding:'6px 0'}}><Icon type="arrowDown" size={16} color={C.gray}/><span style={{fontSize:13,fontWeight:700,color:Number(cr)<10?C.red:Number(cr)<25?C.orange:C.green,background:`${Number(cr)<10?C.red:Number(cr)<25?C.orange:C.green}15`,padding:'2px 12px',borderRadius:20}}>{cr}% conversión</span></div>}
              <div style={{width:`${w}%`,background:`linear-gradient(135deg,${s.color}25,${s.color}10)`,border:`1px solid ${s.color}40`,borderRadius:12,padding:'16px 24px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <div style={{display:'flex',alignItems:'center',gap:12}}>

            return <div key={s.key} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 14px',background:C.bgDark,borderRadius:8,marginBottom:8}}>
              <div><span style={{fontSize:13,color:C.grayLight}}>{prev.label} → {s.label}</span><div style={{fontSize:11,color:C.gray}}>Benchmark: {b}%</div></div>
              <div style={{display:'flex',alignItems:'center',gap:10}}><span style={{fontSize:16,fontWeight:700,color:C.white}}>{rate.toFixed(1)}%</span><StatusBadge status={st}/></div>

        </div>
        <div style={{background:C.bgCard,border:`1px solid ${C.border}`,borderRadius:12,padding:20}}>

        </div>
      </div>
    </div>
  );
}

function CalcTab() {
  const [f,setF]=useState({metaFact:20000,ticket:1600,tasaCierre:25,tasaLlam:60,tasaCal:35,tasaLead:5,cpl:5});
  const u=(k,v)=>setF(p=>({...p,[k]:v}));
  const calc=useMemo(()=>{
    const cl=f.ticket>0?Math.ceil(f.metaFact/f.ticket):0;
    const ll=f.tasaCierre>0?Math.ceil(cl/(f.tasaCierre/100)):0;
    const pr=f.tasaLlam>0?Math.ceil(ll/(f.tasaLlam/100)):0;
    const le=f.tasaCal>0?Math.ceil(pr/(f.tasaCal/100)):0;
    const al=f.tasaLead>0?Math.ceil(le/(f.tasaLead/100)):0;
    const inv=le*f.cpl;
    return {cl,ll,pr,le,al,inv};
  },[f]);
  const roas=calc.inv>0?(f.metaFact/calc.inv).toFixed(1):0;
  const results=[
    {l:'Clientes necesarios',v:calc.cl,icon:'check',c:C.green},
    {l:'Llamadas necesarias',v:calc.ll,icon:'phone',c:C.gold},
    {l:'Prospectos calificados',v:calc.pr,icon:'target',c:C.orange},
    {l:'Leads necesarios',v:calc.le,icon:'users',c:C.purple},
    {l:'Alcance necesario',v:calc.al.toLocaleString(),icon:'eye',c:C.blue}
  ];
  return (
    <div>
      <div style={{marginBottom:20}}><div style={{display:'flex',alignItems:'center',gap:10,marginBottom:4}}><Icon type="calc" size={22} color={C.gold}/><h2 style={{fontSize:20,fontWeight:700,color:C.white,margin:0}}>Calculadora de Ingeniería Inversa</h2></div><p style={{fontSize:13,color:C.gray,marginLeft:32}}>Tu meta → las acciones exactas que necesitas.</p></div>
      <LuqueTip>No empieces por "cuánto contenido hago". Empieza por cuánto quieres facturar y trabaja hacia atrás.</LuqueTip>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:24}}>
        <div style={{background:C.bgCard,border:`1px solid ${C.border}`,borderRadius:12,padding:24}}>
          <h3 style={{fontSize:16,fontWeight:600,color:C.white,margin:'0 0 20px 0'}}>Tus Variables</h3>
          {[{k:'metaFact',l:'Meta facturación mensual ($)'},{k:'ticket',l:'Ticket promedio ($)'},{k:'tasaCierre',l:'Tasa de cierre (%)'},{k:'tasaLlam',l:'% Prospectos que agendan'},{k:'tasaCal',l:'% Leads que califican'},{k:'tasaLead',l:'% Alcance → Lead'},{k:'cpl',l:'CPL estimado ($)'}].map(x=>(
            <div key={x.k} style={{marginBottom:14}}><label style={{fontSize:12,color:C.gray,fontWeight:500,display:'block',marginBottom:6}}>{x.l}</label><NumInput value={f[x.k]} onChange={v=>u(x.k,v)}/></div>
          ))}
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:16}}>
          <div style={{background:`linear-gradient(135deg,${C.darkMid},${C.darkLight})`,border:`1px solid ${C.gold}40`,borderRadius:12,padding:24}}>
            <h3 style={{fontSize:16,fontWeight:600,color:C.gold,margin:'0 0 20px 0'}}>Tu Receta para ${f.metaFact.toLocaleString()}/mes</h3>
            {results.map(r=>(
              <div key={r.l} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 16px',background:`${r.c}10`,borderRadius:8,borderLeft:`3px solid ${r.c}`,marginBottom:10}}>
                <div style={{display:'flex',alignItems:'center',gap:10}}><Icon type={r.icon} size={18} color={r.c}/><span style={{fontSize:14,color:C.grayLight}}>{r.l}</span></div>
                <span style={{fontSize:22,fontWeight:700,color:C.white}}>{r.v}</span>
              </div>
            ))}
          </div>
          <div style={{background:C.bgCard,border:`1px solid ${C.border}`,borderRadius:12,padding:20}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:12}}><span style={{fontSize:14,fontWeight:600,color:C.white}}>Inversión estimada</span><span style={{fontSize:24,fontWeight:700,color:C.gold}}>${calc.inv.toLocaleString()}</span></div>
            <div style={{fontSize:12,color:C.gray}}>ROAS proyectado: <strong style={{color:Number(roas)>=3?C.green:C.orange}}>{roas}x</strong></div>
          </div>
          <div style={{background:C.bgCard,border:`1px solid ${C.border}`,borderRadius:12,padding:20}}>
            <h4 style={{fontSize:14,fontWeight:600,color:C.white,margin:'0 0 10px 0'}}>Desglose Diario (30 días)</h4>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
              {[{l:'Alcance/día',v:Math.ceil(calc.al/30).toLocaleString()},{l:'Leads/día',v:Math.ceil(calc.le/30)},{l:'Llamadas/sem',v:Math.ceil(calc.ll/4)},{l:'Cierres/sem',v:Math.ceil(calc.cl/4)}].map(x=>(
                <div key={x.l} style={{background:C.bgDark,borderRadius:8,padding:'10px 14px'}}><div style={{fontSize:11,color:C.gray}}>{x.l}</div><div style={{fontSize:20,fontWeight:700,color:C.white}}>{x.v}</div></div>
              ))}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

        </div>
        <table style={{width:'100%',borderCollapse:'collapse'}}>

          <tbody>

        <ResponsiveContainer width="100%" height={250}>
          <LineChart data={weeks}>
            <CartesianGrid strokeDasharray="3 3" stroke={C.border}/>
            <XAxis dataKey="sem" stroke={C.gray} fontSize={12}/>
            <YAxis stroke={C.gray} fontSize={12}/>
            <Tooltip contentStyle={{background:C.bgCard,border:`1px solid ${C.border}`,borderRadius:8,fontSize:12}}/>

            📅 Agendar Ahora
          </a>
          <p style={{color:'#6E7681',fontSize:12,marginTop:16}}>Seras redirigido a nuestro calendario de reservas</p>
        </div>
      </div>
    );
  }

  // Load from localStorage on mount
  useEffect(() => {
    const savedProfile = localStorage.getItem('mdm_perfil');
    if (savedProfile) {
      setProfile(JSON.parse(savedProfile));
    } else {
      setShowRegistration(true);
    }

    const savedMetrics = localStorage.getItem('mdm_datos');
    if (savedMetrics) {
      const saved = JSON.parse(savedMetrics);
      if (saved.metrics) setMetrics(saved.metrics);
      if (saved.goals) setGoals(saved.goals);
    }

    const savedPlanGuerra = localStorage.getItem('mdm_plan_guerra');
    if (savedPlanGuerra) {
      setPlanGuerra(JSON.parse(savedPlanGuerra));
    }
  }, []);

  // Auto-save metrics and goals
  useEffect(() => {
    if (profile) {
      localStorage.setItem('mdm_datos', JSON.stringify({metrics, goals}));
    }
  }, [metrics, goals, profile]);

  const handleProfileSubmit = async (formData) => {
    // Send webhook if configured
    if (GHL_WEBHOOK_URL) {
      try {
        const payload = {
          ...formData,
          timestamp: new Date().toISOString()
        };
        await fetch(GHL_WEBHOOK_URL, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify(payload)
        });
      } catch (e) {
        console.log('Webhook call failed (optional):', e);
      }
    }

    // Save profile locally
    setProfile(formData);
    localStorage.setItem('mdm_perfil', JSON.stringify(formData));
    setShowRegistration(false);
  };

  if (showRegistration || !profile) {
    return <RegistrationForm onSubmit={handleProfileSubmit} initialData={profile}/>;
  }

  const firstName = profile.nombreCompleto.split(' ')[0];
  const tabs=[
    {k:'config',l:'Mi Negocio',i:'settings'},
    {k:'planGuerra',l:'Plan de Guerra',i:'megaphone'},
    {k:'dashboard',l:'Dashboard',i:'bar'},
    {k:'embudo',l:'Embudo',i:'layers'},
    {k:'calculadora',l:'Calculadora',i:'calc'},
    {k:'scorecard',l:'Scorecard',i:'target'},
    {k:'calendario',l:'Agendar',i:'calendar'}
  ];

  return (
    <div style={{background:C.bgDark,minHeight:'100vh',fontFamily:"'Inter',-apple-system,sans-serif",color:C.white}}>
      <div style={{background:C.bgCard,borderBottom:`1px solid ${C.border}`,padding:'14px 32px',display:'flex',justifyContent:'space-between',alignItems:'center',position:'sticky',top:0,zIndex:100}}>
        <div style={{display:'flex',alignItems:'center',gap:14}}>
          <svg viewBox="0 0 60 50" style={{width:40,height:34}}>
            <path d="M8 38C8 38 4 38 3 32C2 26 6 16 11 12C16 8 21 11 23 15L31 33C31 33 33 39 29 41C25 43 21 35 19 29L13 17" fill="none" stroke={C.gold} strokeWidth="4" strokeLinecap="round"/>
            <path d="M23 15L31 33C33 39 37 41 39 37L47 9" fill="none" stroke={C.gold} strokeWidth="4" strokeLinecap="round"/>
            <circle cx="45" cy="5" r="3" fill={C.gold}/>
          </svg>
          <div><div style={{fontSize:16,fontWeight:700,color:C.white}}>Hola, {firstName}</div><div style={{fontSize:11,color:C.gray}}>Sistema de Marketing y Ventas · Máquina del Dinero · <span style={{color:C.grayLight}}>by AI Business Growth</span></div></div>
        </div>
        <div style={{display:'flex',gap:4}}>
          {tabs.map(t=>{
            const act=tab===t.k;const isC=t.k==='config';
            return <button key={t.k} onClick={()=>setTab(t.k)} style={{background:act?(isC?`${C.green}20`:`${C.gold}20`):'transparent',border:act?`1px solid ${isC?C.green:C.gold}40`:'1px solid transparent',borderRadius:8,padding:'8px 12px',display:'flex',alignItems:'center',gap:6,cursor:'pointer',color:act?(isC?C.green:C.gold):C.gray,fontSize:13,fontWeight:act?600:400,whiteSpace:'nowrap'}}>
              <Icon type={t.i} size={15} color={act?(isC?C.green:C.gold):C.gray}/>{t.l}
            </button>;
          })}
        </div>
      </div>
      <div style={{padding:'28px 32px',maxWidth:1320,margin:'0 auto'}}>
        {tab==='config'&&<ConfigTab metrics={metrics} setMetrics={setMetrics} goals={goals} setGoals={setGoals} profile={profile} setShowRegistration={setShowRegistration} setProfile={setProfile}/>}
        {tab==='planGuerra'&&<PlanGuerraTab planGuerra={planGuerra} setPlanGuerra={setPlanGuerra}/>}
        {tab==='dashboard'&&<DashboardTab metrics={metrics} goals={goals}/>}
        {tab==='embudo'&&<EmbudoTab metrics={metrics} setMetrics={setMetrics}/>}
        {tab==='calculadora'&&<CalcTab/>}
        {tab==='scorecard'&&<ScorecardTab/>}
        {tab==='calendario'&&<CalendarTab/>}
      </div>
      <div style={{borderTop:`1px solid ${C.border}`,padding:'14px 32px',textAlign:'center',fontSize:11,color:C.gray}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
          <span>Metodología Máquina del Dinero de Álvaro Luque</span>
          <span style={{color:C.border}}>·</span>
          <span style={{display:'flex',alignItems:'center',gap:6}}>Desarrollado por <img src="https://assets.cdn.filesafe.space/dGHJkt1tVLPcTSFvaxx5/media/67c8ac9b-7108-4995-9787-c2de356939be.png" alt="AI Business Growth" style={{height:40,filter:'invert(1)',objectFit:'contain'}} /></span>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
