<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Marketing y Ventas AI Growth</title>
  <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/recharts@2.10.3/dist/Recharts.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --gold: #D4A017;
      --dark: #1A1A2E;
      --dark-mid: #16213E;
      --dark-light: #0F3460;
      --accent: #E94560;
      --green: #00C897;
      --orange: #FF8C00;
      --red: #E94560;
      --blue: #4A90D9;
      --purple: #8B5CF6;
      --gray: #94A3B8;
      --gray-light: #CBD5E1;
      --white: #FFFFFF;
      --bg-dark: #0D1117;
      --bg-card: #161B22;
      --border: #30363D;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background-color: var(--bg-dark);
      color: var(--gray-light);
      line-height: 1.6;
    }

    #root {
      width: 100%;
      min-height: 100vh;
    }

    /* AUTH PAGES */
    .auth-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--dark) 0%, var(--dark-mid) 50%, var(--dark-light) 100%);
      padding: 20px;
    }

    .auth-card {
      background: rgba(22, 27, 34, 0.95);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .auth-logo {
      text-align: center;
      margin-bottom: 30px;
    }

    .ai-logo {
      width: 80px;
      height: 80px;
      margin: 0 auto 20px;
    }

    .auth-title {
      font-size: 28px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 8px;
      text-align: center;
    }

    .auth-subtitle {
      font-size: 13px;
      color: var(--gray);
      text-align: center;
      margin-bottom: 30px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--gray-light);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(30, 41, 59, 0.5);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--white);
      font-size: 14px;
      transition: all 0.3s ease;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--gold);
      background: rgba(30, 41, 59, 0.8);
      box-shadow: 0 0 12px rgba(212, 160, 23, 0.2);
    }

    .form-select {
      width: 100%;
      padding: 12px 16px;
      background: rgba(30, 41, 59, 0.5);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--white);
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .form-select:focus {
      outline: none;
      border-color: var(--gold);
      background: rgba(30, 41, 59, 0.8);
    }

    .form-select option {
      background: var(--dark);
      color: var(--white);
    }

    .btn {
      width: 100%;
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--gold) 0%, #E6B800 100%);
      color: var(--dark);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(212, 160, 23, 0.3);
    }

    .btn-secondary {
      background: transparent;
      color: var(--gold);
      border: 1px solid var(--gold);
    }

    .btn-secondary:hover {
      background: rgba(212, 160, 23, 0.1);
    }

    .auth-link {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: var(--gray);
    }

    .auth-link a {
      color: var(--gold);
      text-decoration: none;
      cursor: pointer;
      font-weight: 600;
    }

    .auth-link a:hover {
      text-decoration: underline;
    }

    /* MAIN APP */
    .app-container {
      display: flex;
      height: 100vh;
      flex-direction: column;
    }

    .app-header {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo-small {
      width: 36px;
      height: 36px;
    }

    .app-name {
      font-size: 18px;
      font-weight: 700;
      color: var(--white);
    }

    .hamburger {
      display: none;
      background: none;
      border: none;
      color: var(--white);
      font-size: 24px;
      cursor: pointer;
      padding: 8px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .user-info {
      text-align: right;
      font-size: 13px;
    }

    .user-name {
      color: var(--white);
      font-weight: 600;
    }

    .user-email {
      color: var(--gray);
      font-size: 12px;
    }

    .btn-logout {
      padding: 8px 16px;
      background: transparent;
      border: 1px solid var(--red);
      color: var(--red);
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .btn-logout:hover {
      background: rgba(233, 69, 96, 0.1);
    }

    .app-main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .app-nav {
      width: 280px;
      background: var(--bg-card);
      border-right: 1px solid var(--border);
      padding: 20px 0;
      overflow-y: auto;
    }

    .nav-item {
      padding: 12px 20px;
      color: var(--gray);
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: all 0.3s ease;
      font-size: 13px;
      font-weight: 500;
    }

    .nav-item:hover {
      color: var(--gold);
      background: rgba(212, 160, 23, 0.1);
    }

    .nav-item.active {
      color: var(--gold);
      background: rgba(212, 160, 23, 0.15);
      border-left-color: var(--gold);
    }

    .app-content {
      flex: 1;
      overflow-y: auto;
      padding: 30px;
    }

    .page-title {
      font-size: 28px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 24px;
    }

    .section {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
    }

    .section-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--white);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .collapsible-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      padding: 16px 0;
      border-bottom: 1px solid var(--border);
      user-select: none;
    }

    .collapsible-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--white);
    }

    .collapsible-toggle {
      color: var(--gray);
      font-size: 20px;
      transition: transform 0.3s ease;
    }

    .collapsible-toggle.open {
      transform: rotate(180deg);
    }

    .collapsible-content {
      margin-top: 16px;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }

    .collapsible-content.open {
      max-height: 1000px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-bottom: 24px;
    }

    .grid-4 {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-bottom: 24px;
    }

    .grid-2x2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }

    .kpi-card {
      background: linear-gradient(135deg, rgba(212, 160, 23, 0.1) 0%, rgba(74, 144, 217, 0.1) 100%);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }

    .kpi-label {
      font-size: 12px;
      color: var(--gray);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .kpi-value {
      font-size: 28px;
      font-weight: 700;
      color: var(--gold);
      margin-bottom: 4px;
    }

    .kpi-unit {
      font-size: 12px;
      color: var(--gray);
    }

    .textarea-field {
      width: 100%;
      padding: 12px 16px;
      background: rgba(30, 41, 59, 0.5);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--white);
      font-family: inherit;
      font-size: 14px;
      resize: vertical;
      min-height: 100px;
      transition: all 0.3s ease;
    }

    .textarea-field:focus {
      outline: none;
      border-color: var(--gold);
      background: rgba(30, 41, 59, 0.8);
      box-shadow: 0 0 12px rgba(212, 160, 23, 0.2);
    }

    .tip-box {
      background: linear-gradient(135deg, rgba(0, 200, 151, 0.1) 0%, rgba(74, 144, 217, 0.1) 100%);
      border-left: 4px solid var(--green);
      padding: 16px;
      border-radius: 8px;
      margin-top: 20px;
      font-size: 13px;
      line-height: 1.6;
    }

    .tip-title {
      color: var(--green);
      font-weight: 600;
      margin-bottom: 8px;
    }

    .tip-content {
      color: var(--gray-light);
    }

    .link-button {
      background: none;
      border: none;
      color: var(--gold);
      cursor: pointer;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .link-button:hover {
      color: var(--white);
      text-decoration: underline;
    }

    .card-gradient {
      background: linear-gradient(135deg, rgba(212, 160, 23, 0.15) 0%, rgba(233, 69, 96, 0.15) 100%);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .card-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--white);
      margin-bottom: 12px;
    }

    .funnel-stage {
      margin-bottom: 20px;
    }

    .funnel-bar {
      background: linear-gradient(90deg, var(--blue) 0%, var(--blue) 100%);
      border-radius: 8px;
      padding: 12px 16px;
      color: var(--white);
      font-weight: 600;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .funnel-info {
      font-size: 12px;
      color: var(--gray);
      padding: 0 16px;
    }

    /* RESPONSIVE DESIGN */
    @media (max-width: 1024px) {
      .grid-4 {
        grid-template-columns: repeat(2, 1fr);
      }

      .app-nav {
        width: 240px;
      }

      .app-content {
        padding: 20px;
      }
    }

    @media (max-width: 768px) {
      .hamburger {
        display: block;
      }

      .app-main {
        flex-direction: column;
      }

      .app-nav {
        width: 100%;
        max-height: 0;
        overflow: hidden;
        border-right: none;
        border-bottom: 1px solid var(--border);
        transition: max-height 0.3s ease;
      }

      .app-nav.open {
        max-height: 500px;
      }

      .nav-item {
        padding: 16px 20px;
      }

      .app-content {
        padding: 16px;
      }

      .page-title {
        font-size: 22px;
        margin-bottom: 16px;
      }

      .section {
        padding: 16px;
        margin-bottom: 16px;
      }

      .grid-2,
      .grid-2x2 {
        grid-template-columns: 1fr;
        gap: 16px;
      }

      .grid-4 {
        grid-template-columns: 1fr;
      }

      .header-right {
        flex-direction: column;
        gap: 8px;
      }

      .user-info {
        text-align: left;
      }

      .auth-card {
        padding: 24px;
      }

      .ai-logo {
        width: 60px;
        height: 60px;
      }

      .auth-title {
        font-size: 22px;
      }
    }

    @media (max-width: 480px) {
      .auth-card {
        padding: 20px;
      }

      .page-title {
        font-size: 18px;
      }

      .kpi-value {
        font-size: 24px;
      }

      .form-input,
      .form-select,
      .textarea-field {
        font-size: 16px;
      }
    }

    /* SCROLLBAR STYLING */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg-dark);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--gray);
    }

    /* CHARTS */
    .recharts-wrapper {
      width: 100%;
      height: 300px;
      margin: 20px 0;
    }

    .recharts-default-tooltip {
      background: var(--bg-card) !important;
      border: 1px solid var(--border) !important;
      border-radius: 8px !important;
    }

    .recharts-default-tooltip-cursor {
      stroke: var(--gold) !important;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // CONSTANTS
    const C = {
      gold: "#D4A017", dark: "#1A1A2E", darkMid: "#16213E", darkLight: "#0F3460",
      accent: "#E94560", green: "#00C897", orange: "#FF8C00", red: "#E94560",

    const INDUSTRIES = ['Salud/Medicina', 'Fitness/Gimnasio', 'Restaurante/Alimentos', 'EducaciÃ³n', 'Servicios Profesionales', 'E-commerce', 'Bienes RaÃ­ces', 'Belleza/EstÃ©tica', 'TecnologÃ­a', 'Marketing/Publicidad', 'Otro'];

    const COUNTRIES = ['Argentina', 'Bolivia', 'Brasil', 'Chile', 'Colombia', 'Costa Rica', 'Cuba', 'Ecuador', 'El Salvador', 'Guatemala', 'Guyana', 'Honduras', 'Jamaica', 'MÃ©xico', 'Nicaragua', 'PanamÃ¡', 'Paraguay', 'PerÃº', 'RepÃºblica Dominicana', 'Surinam', 'Uruguay', 'Venezuela', 'Estados Unidos', 'EspaÃ±a'];

    // AI BUSINESS GROWTH LOGO
    const LOGO_URL = 'https://assets.cdn.filesafe.space/dGHJkt1tVLPcTSFvaxx5/media/67c8ac9b-7108-4995-9787-c2de356939be.png';
    const AILogo = ({ width = 80, height = 80 }) => (
      <img src={LOGO_URL} alt="AI Business Growth" width={width} height={height} style={{objectFit: 'contain', filter: 'invert(1)'}} />
    );

    // SIMPLE HASH FUNCTION FOR PASSWORDS
    const hashPassword = (password) => {
      let hash = 0;
      for (let i = 0; i < password.length; i++) {
        const char = password.charCodeAt(i);
        hash = ((hash << 5) - hash) + char;
        hash = hash & hash;
      }
      return Math.abs(hash).toString(36);
    };

    // LOGIN PAGE
    const LoginPage = ({ onLogin }) => {
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [isRegister, setIsRegister] = useState(false);
      const [formData, setFormData] = useState({
        nombre: '', email: '', telefono: '', empresa: '', password: '', passwordConfirm: ''
      });

      const handleLogin = (e) => {
        e.preventDefault();
        const users = JSON.parse(localStorage.getItem('users') || '{}');
        if (users[email] && users[email].passwordHash === hashPassword(password)) {
          localStorage.setItem('currentUser', email);
          onLogin(users[email]);

          registeredAt: new Date().toISOString()

      if (isRegister) {

                </div>
                <div className="form-group">

                  <input type="text" className="form-input" value={formData.empresa} onChange={(e) => setFormData({...formData, empresa: e.target.value})} required />
                </div>
                <div className="form-group">
                  <label className="form-label">ContraseÃ±a</label>
                  <input type="password" className="form-input" value={formData.password} onChange={(e) => setFormData({...formData, password: e.target.value})} required />
                </div>
                <div className="form-group">
                  <label className="form-label">Confirmar ContraseÃ±a</label>
                  <input type="password" className="form-input" value={formData.passwordConfirm} onChange={(e) => setFormData({...formData, passwordConfirm: e.target.value})} required />
                </div>

              <div className="auth-link">
                Â¿Ya tienes cuenta? <a onClick={() => setIsRegister(false)}>Inicia sesiÃ³n</a>
              </div>
            </div>
          </div>
        );
      }

      return (
        <div className="auth-container">

              <AILogo width={80} height={80} />
              <div className="auth-title">Sistema de Marketing y Ventas AI Growth</div>
              <div className="auth-subtitle">Inicia SesiÃ³n</div>
            </div>
            <form onSubmit={handleLogin}>
              <div className="form-group">
                <label className="form-label">Email</label>
                <input type="email" className="form-input" value={email} onChange={(e) => setEmail(e.target.value)} required />

                <input type="password" className="form-input" value={password} onChange={(e) => setPassword(e.target.value)} required />

        </div>
      );
    };

    // COLLAPSIBLE SECTION
    const Collapsible = ({ title, children, defaultOpen = true }) => {
      const [isOpen, setIsOpen] = useState(defaultOpen);
      return (

                  <div className="kpi-value">{roas.toFixed(2)}x</div>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    };

    // SCORECARD TAB
    const ScorecardTab = ({ user }) => {
      const [scores, setScores] = useState(JSON.parse(localStorage.getItem(`scorecard_${user.email}`) || '{"marketing": 5, "ventas": 5, "producto": 5, "operaciones": 5, "finanzas": 5, "equipo": 5, "tech": 5, "liderazgo": 5}'));

      const areas = Object.keys(scores);
      const avgScore = (Object.values(scores).reduce((a, b) => a + b, 0) / areas.length).toFixed(1);

      const handleSave = () => {
        localStorage.setItem(`scorecard_${user.email}`, JSON.stringify(scores));
        alert('Scorecard guardado');
      };

      return (
        <div>
          <h1 className="page-title">Scorecard de Negocio</h1>

          <div className="section">
            <div className="section-title" style={{marginBottom: 20}}>PuntÃºa cada Ã¡rea de 1 a 10</div>
            <div style={{display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(150px, 1fr))', gap: 16, marginBottom: 24}}>
              {areas.map(area => (
                <div key={area}>
                  <label className="form-label" style={{textTransform: 'capitalize', marginBottom: 8}}>{area}</label>
                  <input type="number" className="form-input" min="1" max="10" value={scores[area]} onChange={(e) => setScores({...scores, [area]: parseInt(e.target.value)})} />
                  <div style={{textAlign: 'center', fontSize: 24, fontWeight: 700, color: C.gold, marginTop: 8}}>{scores[area]}/10</div>
                </div>
              ))}
            </div>
            <button className="btn btn-primary" onClick={handleSave}>Guardar Scorecard</button>
          </div>

          <div className="section">
            <div className="section-title">Score General</div>
            <div className="kpi-card">
              <div className="kpi-label">PuntuaciÃ³n Promedio</div>
              <div className="kpi-value">{avgScore}/10</div>
            </div>

            <div style={{marginTop: 20}}>
              {Object.entries(scores).map(([area, score]) => (
                <div key={area} style={{marginBottom: 12}}>
                  <div style={{display: 'flex', justifyContent: 'space-between', marginBottom: 4}}>
                    <span style={{fontSize: 13, fontWeight: 600, textTransform: 'capitalize'}}>{area}</span>
                    <span style={{fontSize: 13, color: C.gray}}>{score}/10</span>
                  </div>
                  <div style={{height: 6, background: C.border, borderRadius: 3, overflow: 'hidden'}}>
                    <div style={{height: '100%', width: `${(score / 10) * 100}%`, background: score >= 7 ? C.green : score >= 5 ? C.gold : C.red}} />
                  </div>
                </div>
              ))}
            </div>

            <div className="tip-box" style={{marginTop: 20}}>
              <div className="tip-title">ð Recomendaciones</div>
              <div className="tip-content">
                {avgScore >= 8 ? 'Excelente desempeÃ±o general. MantÃ©n el momentum y optimiza las Ã¡reas con puntuaciÃ³n menor a 8.' :
                avgScore >= 6 ? 'Buen desempeÃ±o. EnfÃ³cate en mejorar las Ã¡reas con puntuaciÃ³n menor a 6.' :
                'Necesitas mejoras significativas. Comienza con el Ã¡rea mÃ¡s baja y mejora paso a paso.'}
              </div>
            </div>
          </div>
        </div>
      );
    };

    // AGENDAR TAB
    const AgendarTab = ({ user }) => {
      return (
        <div>
          <h1 className="page-title">Agendar Llamada</h1>

          <div className="section">
            <div className="section-title">Agenda tu Llamada EstratÃ©gica</div>
            <p style={{marginBottom: 20, color: C.gray}}>Selecciona un horario disponible para una llamada de 30 minutos con nuestro equipo.</p>

            <div style={{marginBottom: 20}}>
              <iframe
                src={CALENDAR_EMBED_URL}
                style={{width: '100%', height: '600px', border: 'none', borderRadius: 12}}
                frameBorder="0"
              />
            </div>

            <button className="btn btn-secondary" onClick={() => window.open(CALENDAR_URL, '_blank')}>
              Abrir en Nueva PestaÃ±a
            </button>
          </div>
        </div>
      );
    };

    // MAIN APP COMPONENT
    const MainApp = ({ user, onLogout }) => {
      const [currentTab, setCurrentTab] = useState('negocio');
      const [menuOpen, setMenuOpen] = useState(false);
      const [userData, setUserData] = useState(user);

      const tabs = [
        {id: 'negocio', label: 'Mi Negocio'},
        {id: 'guerra', label: 'Plan de Guerra'},
        {id: 'dashboard', label: 'Dashboard'},
        {id: 'embudo', label: 'Embudo'},
        {id: 'calculadora', label: 'Calculadora'},
        {id: 'scorecard', label: 'Scorecard'},
        {id: 'agendar', label: 'Agendar'}
      ];

      const renderTab = () => {
        switch(currentTab) {
          case 'negocio': return <MiNegocioTab user={userData} setUser={setUserData} />;
          case 'guerra': return <PlanDeGuerraTab user={userData} />;
          case 'dashboard': return <DashboardTab user={userData} />;
          case 'embudo': return <EmbudoTab user={userData} />;
          case 'calculadora': return <CalculadoraTab user={userData} />;
          case 'scorecard': return <ScorecardTab user={userData} />;
          case 'agendar': return <AgendarTab user={userData} />;
          default: return <DashboardTab user={userData} />;
        }
      };

      return (
        <div className="app-container">
          <div className="app-header">
            <div className="header-left">
              <button className="hamburger" onClick={() => setMenuOpen(!menuOpen)}>â°</button>
              <AILogo width={36} height={36} />
              <div>
                <div className="app-name">Sistema de Marketing y Ventas AI Growth</div>
                <div style={{fontSize: 11, color: C.gray}}>Basado en las enseÃ±anzas de MÃ¡quina del Dinero de Luque</div>
              </div>
            </div>
            <div className="header-right">
              <div className="user-info">
                <div className="user-name">{userData.nombre}</div>
                <div className="user-email">{userData.email}</div>
              </div>
              <button className="btn-logout" onClick={onLogout}>Salir</button>
            </div>
          </div>

          <div className="app-main">
            <nav className={`app-nav ${menuOpen ? 'open' : ''}`}>
              {tabs.map(tab => (
                <div key={tab.id} className={`nav-item ${currentTab === tab.id ? 'active' : ''}`} onClick={() => {
                  setCurrentTab(tab.id);
                  setMenuOpen(false);
                }}>
                  {tab.label}
                </div>
              ))}
            </nav>

            <div className="app-content">
              {renderTab()}
            </div>
          </div>

          <div style={{background: C.bgCard, borderTop: `1px solid ${C.border}`, padding: 16, textAlign: 'center', fontSize: 12, color: C.gray}}>
            MetodologÃ­a MÃ¡quina del Dinero de Ãlvaro Luque Â· Desarrollado por <img src={LOGO_URL} alt="AI Business Growth" width={24} height={24} style={{display: 'inline-block', verticalAlign: 'middle', marginLeft: 6, filter: 'invert(1)'}} />
          </div>
        </div>
      );
    };

    // ROOT COMPONENT
    const App = () => {
      const [user, setUser] = useState(null);

      useEffect(() => {
        const currentUser = localStorage.getItem('currentUser');
        if (currentUser) {
          const users = JSON.parse(localStorage.getItem('users') || '{}');
          if (users[currentUser]) {
            setUser(users[currentUser]);
          }
        }
      }, []);

      const handleLogin = (userData) => {
        setUser(userData);
      };

      const handleLogout = () => {
        localStorage.removeItem('currentUser');
        setUser(null);
      };

      return user ? <MainApp user={user} onLogout={handleLogout} /> : <LoginPage onLogin={handleLogin} />;
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
